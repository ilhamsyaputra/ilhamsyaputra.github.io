    imageUrl: "images/m-ilham-syaputra.webp"
    imageWidth: 120
    imageHeight: 120

  socialIcons:
    - name: "linkedin"
      url: "https://www.linkedin.com/in/m-ilham-syaputra/"
    - name: "email"
