baseURL: "https://ilhamsyaputra.com/"
languageCode: en-us
title: M. Ilham Syaputra
theme: ["PaperMod"]
enableRobotsTXT: true

minify:
  minifyOutput: true

params:
  env: production
  title: "M Ilham Syaputra"
  description: "Hi, I'm Ilham. I build backend systems, run homelabs, and write about tech, finance, and whatever I'm currently learning."
  author: "M. Ilham Syaputra"
  images:
    - "/images/m-ilham-syaputra-preview.webp"
  keywords: [
    "M. Ilham Syaputra",
    "Ilham Syaputra",
    "backend engineer",
    "backend developer",
    "golang developer",
    "software engineer",
  ]
  canonicalURL: "https://ilhamsyaputra.com/"
  DateFormat: "January 2, 2006"
  defaultTheme: dark
  disableThemeToggle: false

  assets:
    favicon: "favicon.svg"
    favicon16x16: "favicon.svg"
    favicon32x32: "favicon.svg"

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  label:
    text: "M. Ilham Syaputra"
    # icon: "images/coding.png"
    # iconHeight: 35


  profileMode:
    enabled: true
    title: "Hi, Im Ilham! \U0001F44B"
    subtitle: > 
      Backend engineer specializing in Go, distributed systems, and currently building homelab.
      I share insights on software engineering, personal finance, and continuous learning.
    imageUrl: "images/m-ilham-syaputra.webp"
    imageWidth: 140
    imageHeight: 140

  socialIcons:
    - name: "linkedin"
      url: "https://www.linkedin.com/in/m-ilham-syaputra/"
    - name: "email"
      url: "mailto:ilhamsyaputra25@gmail.com"


menu:
  main:
    - identifier: about
      name: About
      url: about
      weight: 3
    - identifier: resume
      name: Resume
      url: resume
      weight: 2
    - identifier: posts
      name: Posts
      url: posts/
      weight: 1


markup:
  goldmark:
    renderer:
      unsafe: true

caches:
  images:
    dir: :cacheDir/images